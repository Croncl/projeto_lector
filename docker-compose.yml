services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lector
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # Limites de recursos (ajuste conforme a máquina)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped
    # Volume para arquivos temporários (evita disco do container)
    tmpfs:
      - /tmp:size=512m
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
